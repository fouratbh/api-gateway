server:
  port: 9000

spring:
cloud:
gateway:
routes:
- id: order-service
uri: ${ORDER_SERVICE_URL:http://localhost:8081}
predicates:
- Path=/api/orders/**
- id: inventory-service
  uri: ${INVENTORY_SERVICE_URL:http://localhost:8080}
  predicates:
- Path=/api/products/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"