apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: your-docker-username/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 
          env:
            
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8081"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:8082"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8083"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
spec:
  type: LoadBalancer 
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80 
      targetPort: 8080